<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-50 text-slate-900">
    <div class="min-h-dvh">
      <header class="sticky top-0 z-10 border-b border-slate-200 bg-white/80 backdrop-blur">
        <div class="mx-auto flex max-w-6xl items-center justify-between gap-4 px-4 py-3">
          <div>
            <div class="text-lg font-semibold leading-tight">Task Dashboard</div>
            <div class="text-xs text-slate-500">Quản lý task từ Telegram Bot</div>
          </div>
          <div class="flex items-center gap-2">
            <span id="lastUpdated" class="hidden text-xs text-slate-500 sm:inline"></span>
            <button
              id="refreshBtn"
              class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium hover:bg-slate-50 active:bg-slate-100"
              type="button"
            >
              Tải lại
            </button>
          </div>
        </div>
      </header>

      <main class="mx-auto max-w-6xl space-y-4 px-4 py-4">
        <section class="grid grid-cols-1 gap-3 sm:grid-cols-3">
          <div class="rounded-2xl border border-slate-200 bg-white p-4">
            <div class="text-xs font-medium text-slate-500">Tổng số task</div>
            <div id="statTotal" class="mt-1 text-2xl font-semibold">—</div>
          </div>
          <div class="rounded-2xl border border-slate-200 bg-white p-4">
            <div class="text-xs font-medium text-slate-500">Task đang chờ</div>
            <div id="statPending" class="mt-1 text-2xl font-semibold text-amber-600">—</div>
          </div>
          <div class="rounded-2xl border border-slate-200 bg-white p-4">
            <div class="text-xs font-medium text-slate-500">Task đã hoàn thành</div>
            <div id="statDone" class="mt-1 text-2xl font-semibold text-emerald-600">—</div>
          </div>
        </section>

        <section class="rounded-2xl border border-slate-200 bg-white p-4">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div class="min-w-0">
              <div class="text-base font-semibold">Danh sách task</div>
              <div id="subtext" class="text-xs text-slate-500">—</div>
            </div>
            <div class="flex w-full flex-col gap-2 sm:w-auto sm:flex-row sm:items-center">
              <div class="relative w-full sm:w-80">
                <input
                  id="searchInput"
                  type="text"
                  placeholder="Lọc theo assignee (vd: an, minh...)"
                  class="w-full rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm outline-none ring-0 placeholder:text-slate-400 focus:border-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-200"
                />
              </div>
            </div>
          </div>

          <div class="mt-4 overflow-x-auto">
            <table class="min-w-full border-separate border-spacing-y-2">
              <thead class="text-left text-xs font-semibold text-slate-500">
                <tr>
                  <th class="px-3 py-2">Assignee</th>
                  <th class="px-3 py-2">Nội dung</th>
                  <th class="hidden px-3 py-2 sm:table-cell">Thời gian tạo</th>
                  <th class="px-3 py-2">Trạng thái</th>
                  <th class="px-3 py-2 text-right">Thao tác</th>
                </tr>
              </thead>
              <tbody id="taskTbody"></tbody>
            </table>
          </div>

          <div id="emptyState" class="mt-6 hidden rounded-xl border border-dashed border-slate-200 bg-slate-50 p-6 text-center">
            <div class="text-sm font-semibold">Chưa có task nào</div>
            <div class="mt-1 text-xs text-slate-500">Hãy tạo task từ Telegram theo cú pháp: <span class="font-mono">@nguoi_nhan noi_dung @BruceShark12_bot</span></div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const els = {
        statTotal: document.getElementById("statTotal"),
        statPending: document.getElementById("statPending"),
        statDone: document.getElementById("statDone"),
        tbody: document.getElementById("taskTbody"),
        empty: document.getElementById("emptyState"),
        subtext: document.getElementById("subtext"),
        search: document.getElementById("searchInput"),
        refresh: document.getElementById("refreshBtn"),
        lastUpdated: document.getElementById("lastUpdated"),
      };

      const fmt = new Intl.DateTimeFormat("vi-VN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });

      function escapeHtml(s) {
        return String(s)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function badge(status) {
        if (status === "done") {
          return `<span class="inline-flex items-center rounded-full bg-emerald-50 px-2 py-1 text-xs font-semibold text-emerald-700 ring-1 ring-inset ring-emerald-200">done</span>`;
        }
        return `<span class="inline-flex items-center rounded-full bg-amber-50 px-2 py-1 text-xs font-semibold text-amber-700 ring-1 ring-inset ring-amber-200">pending</span>`;
      }

      async function apiFetch(url, options) {
        const res = await fetch(url, options);
        const text = await res.text();
        let data = null;
        try {
          data = text ? JSON.parse(text) : null;
        } catch (_) {
          // ignore
        }
        if (!res.ok) {
          const msg = (data && (data.error || data.message)) || `HTTP ${res.status}`;
          throw new Error(msg);
        }
        return data;
      }

      function renderRows(tasks) {
        const q = els.search.value.trim().toLowerCase();
        const filtered = q
          ? tasks.filter((t) => String(t.assignee || "").toLowerCase().includes(q))
          : tasks;

        els.subtext.textContent = `Hiển thị ${filtered.length} / ${tasks.length} task`;
        els.empty.classList.toggle("hidden", tasks.length !== 0);

        if (filtered.length === 0) {
          els.tbody.innerHTML = "";
          return;
        }

        els.tbody.innerHTML = filtered
          .map((t) => {
            const created = t.createdAt ? fmt.format(new Date(t.createdAt)) : "—";
            const assignee = escapeHtml(t.assignee ?? "");
            const content = escapeHtml(t.content ?? "");
            const status = t.status === "done" ? "done" : "pending";

            const completeBtn =
              status === "pending"
                ? `<button data-action="done" data-id="${t.id}" class="rounded-lg bg-emerald-600 px-3 py-1.5 text-xs font-semibold text-white hover:bg-emerald-700 active:bg-emerald-800">Hoàn thành</button>`
                : `<span class="text-xs text-slate-400">—</span>`;

            return `
              <tr class="bg-white">
                <td class="whitespace-nowrap rounded-l-xl border border-slate-200 px-3 py-3 align-top">
                  <div class="text-sm font-semibold">@${assignee}</div>
                  <div class="mt-1 text-xs text-slate-500 sm:hidden">${escapeHtml(created)}</div>
                </td>
                <td class="border-y border-slate-200 px-3 py-3 align-top">
                  <div class="text-sm leading-relaxed">${content}</div>
                </td>
                <td class="hidden whitespace-nowrap border-y border-slate-200 px-3 py-3 align-top text-sm text-slate-600 sm:table-cell">${escapeHtml(created)}</td>
                <td class="whitespace-nowrap border-y border-slate-200 px-3 py-3 align-top">${badge(status)}</td>
                <td class="whitespace-nowrap rounded-r-xl border border-slate-200 px-3 py-3 align-top text-right">
                  <div class="flex justify-end gap-2">
                    ${completeBtn}
                    <button data-action="delete" data-id="${t.id}" class="rounded-lg border border-slate-200 bg-white px-3 py-1.5 text-xs font-semibold hover:bg-slate-50 active:bg-slate-100">Xóa</button>
                  </div>
                </td>
              </tr>
            `;
          })
          .join("");
      }

      async function load() {
        const data = await apiFetch("/api/tasks");
        els.statTotal.textContent = data.total ?? data.tasks?.length ?? 0;
        els.statPending.textContent = data.pending ?? 0;
        els.statDone.textContent = data.done ?? 0;
        renderRows(Array.isArray(data.tasks) ? data.tasks : []);
        const now = new Date();
        els.lastUpdated.textContent = `Cập nhật: ${fmt.format(now)}`;
      }

      async function markDone(id) {
        await apiFetch(`/api/tasks/${encodeURIComponent(id)}`, {
          method: "PATCH",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ status: "done" }),
        });
      }

      async function removeTask(id) {
        await apiFetch(`/api/tasks/${encodeURIComponent(id)}`, { method: "DELETE" });
      }

      els.tbody.addEventListener("click", async (e) => {
        const btn = e.target.closest("button[data-action]");
        if (!btn) return;

        const action = btn.getAttribute("data-action");
        const id = btn.getAttribute("data-id");
        if (!id) return;

        btn.disabled = true;
        btn.classList.add("opacity-60");

        try {
          if (action === "done") {
            await markDone(id);
          } else if (action === "delete") {
            const ok = confirm("Xóa task này?");
            if (!ok) return;
            await removeTask(id);
          }
          await load();
        } catch (err) {
          alert(err?.message || String(err));
        } finally {
          btn.disabled = false;
          btn.classList.remove("opacity-60");
        }
      });

      els.search.addEventListener("input", async () => {
        try {
          const data = await apiFetch("/api/tasks");
          renderRows(Array.isArray(data.tasks) ? data.tasks : []);
        } catch (_) {
          // ignore
        }
      });

      els.refresh.addEventListener("click", async () => {
        els.refresh.disabled = true;
        try {
          await load();
        } catch (err) {
          alert(err?.message || String(err));
        } finally {
          els.refresh.disabled = false;
        }
      });

      load().catch((err) => {
        els.subtext.textContent = `Không thể tải dữ liệu: ${err?.message || String(err)}`;
      });

      setInterval(() => {
        load().catch(() => {});
      }, 30_000);
    </script>
  </body>
</html>
